{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
  <h2>Crear cuenta</h2>
  <form method="POST" class="login-form">
    <input class="input" type="text"     name="nombre"     placeholder="Tu nombre completo" required>
    <input class="input" type="email"    name="email"      placeholder="Correo electrónico" required>
    <input class="input" type="password" name="contrasena" placeholder="Contraseña"         required>
    <button class="btn primary" type="submit">Registrarse</button>
  </form>
  <p style="margin-top:1rem; font-size:0.85rem;">
    ¿Ya tienes cuenta? <a class="link-back" href="{{ url_for('login_cliente') }}">Inicia sesión</a>
  </p>
</div>
{% endblock %}
