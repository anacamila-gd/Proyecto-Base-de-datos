{% extends "base.html" %}
{% block content %}
<div class="form-wrap">
  <h1>{{ accion }} producto</h1>
  <form class="admin-form" method="post" enctype="multipart/form-data">

    <label>Nombre</label>
    <input class="input" type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required>

    <label>Descripción</label>
    <textarea class="input textarea" name="descripcion">{{ producto.descripcion if producto else '' }}</textarea>

    <label>Precio ($)</label>
    <input class="input" type="number" step="0.01" name="precio" value="{{ producto.precio if producto else '' }}" required>

    <label>Stock</label>
    <input class="input" type="number" name="stock" value="{{ producto.stock if producto else '' }}" required>

    <label>Foto del producto</label>
    {% if producto and producto["imagen"] %}
      <img src="{{ url_for('static', filename='img/' + producto['imagen']) }}" class="preview-img">
      <p class="muted">Sube una nueva foto para reemplazar la actual.</p>
    {% endif %}
    <input type="file" name="imagen" accept="image/*" class="input">

    <button class="btn primary" type="submit">{{ accion }} producto</button>
    <a class="btn" href="{{ url_for('admin_productos') }}">Cancelar</a>
  </form>
</div>
{% endblock %}
