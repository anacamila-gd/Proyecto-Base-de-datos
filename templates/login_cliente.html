{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
  <h2>Iniciar sesión</h2>
  <form method="POST" class="login-form">
    <input class="input" type="email"    name="email"      placeholder="Correo electrónico" required>
    <input class="input" type="password" name="contrasena" placeholder="Contraseña"         required>
    <button class="btn primary" type="submit">Entrar</button>
  </form>
  <p style="margin-top:1rem; font-size:0.85rem;">
    ¿No tienes cuenta? <a class="link-back" href="{{ url_for('registro') }}">Regístrate aquí</a>
  </p>
</div>
{% endblock %}
